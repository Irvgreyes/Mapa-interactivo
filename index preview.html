<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Alertas Vehiculares · Estado de Puebla</title>

  <!-- ═══════════════════════════════════════════════
       DEPENDENCIAS CDN
  ════════════════════════════════════════════════ -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════════════
       VARIABLES GLOBALES & RESET
    ══════════════════════════════════════════════ */
    :root {
      --bg-void:       #080c14;
      --bg-surface:    #0d1421;
      --bg-card:       rgba(13, 20, 33, 0.82);
      --bg-glass:      rgba(20, 32, 54, 0.70);
      --border-dim:    rgba(255, 255, 255, 0.07);
      --border-glow:   rgba(255, 160, 30, 0.45);

      --accent:        #ffa01e;
      --accent-dim:    rgba(255, 160, 30, 0.18);
      --accent-glow:   rgba(255, 160, 30, 0.55);
      --danger:        #ff3d5a;
      --danger-dim:    rgba(255, 61, 90, 0.18);
      --success:       #2af5a0;
      --info:          #38b6ff;

      --text-hi:       #f0f4ff;
      --text-mid:      #8896b3;
      --text-lo:       #4a5870;

      --poly-idle:     rgba(255, 160, 30, 0.12);
      --poly-hover:    rgba(255, 160, 30, 0.32);
      --poly-active:   rgba(255, 61, 90, 0.38);
      --poly-stroke:   #ffa01e;
      --poly-stroke-a: #ff3d5a;

      --sidebar-w:     420px;
      --radius:        10px;
      --radius-lg:     16px;
      --transition:    0.28s cubic-bezier(.4,0,.2,1);
    }

    /* ── MODO DÍA ── */
    body.day-mode {
      --bg-void:    #e8edf5;
      --bg-surface: #f0f4fb;
      --bg-card:    rgba(240, 244, 251, 0.90);
      --bg-glass:   rgba(220, 230, 245, 0.80);
      --border-dim: rgba(0, 0, 0, 0.08);
      --text-hi:    #101828;
      --text-mid:   #4a5568;
      --text-lo:    #9aa5b4;
      --poly-idle:  rgba(255, 140, 10, 0.10);
      --poly-hover: rgba(255, 140, 10, 0.28);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg-void);
      color: var(--text-hi);
    }

    /* ══════════════════════════════════════════════
       LOADING OVERLAY
    ══════════════════════════════════════════════ */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-void);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loading-overlay.hidden { opacity: 0; visibility: hidden; }

    .loader-ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid var(--border-dim);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
      position: relative;
    }
    .loader-ring::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: var(--danger);
      animation: spin 1.4s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--text-mid);
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0.3 } }

    .loader-brand {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-hi);
    }
    .loader-brand span { color: var(--accent); }

    /* ══════════════════════════════════════════════
       LAYOUT PRINCIPAL
    ══════════════════════════════════════════════ */
    #app {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── BARRA SUPERIOR HUD ── */
    #hud {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 800;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-glass);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid var(--border-dim);
      border-radius: 40px;
      padding: 8px 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.04);
      white-space: nowrap;
      transition: var(--transition);
    }

    .hud-logo {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: var(--text-hi);
      letter-spacing: -0.3px;
    }
    .hud-logo span { color: var(--accent); }

    .hud-divider {
      width: 1px; height: 22px;
      background: var(--border-dim);
      flex-shrink: 0;
    }

    .hud-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-mid);
    }
    .hud-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100%{ box-shadow: 0 0 0 0 rgba(42,245,160,0.4) }
      50%{ box-shadow: 0 0 0 5px rgba(42,245,160,0) }
    }

    .hud-selected {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: var(--transition);
    }

    .hud-metrics {
      display: flex;
      gap: 16px;
    }
    .hud-metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .hud-metric .val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-hi);
      transition: var(--transition);
    }
    .hud-metric .lbl {
      font-size: 9px;
      color: var(--text-lo);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .hud-metric .val.flash {
      animation: flash-val 0.5s ease;
    }
    @keyframes flash-val {
      0%{ color: var(--accent); transform: scale(1.2) }
      100%{ color: var(--text-hi); transform: scale(1) }
    }

    /* ══════════════════════════════════════════════
       MAPA
    ══════════════════════════════════════════════ */
    #map {
      flex: 1;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Ocultar controles de Leaflet por defecto y re-estilizarlos */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: none !important;
    }
    .leaflet-control-zoom a {
      width: 36px !important; height: 36px !important;
      line-height: 36px !important;
      background: var(--bg-glass) !important;
      backdrop-filter: blur(12px) !important;
      border: 1px solid var(--border-dim) !important;
      color: var(--text-hi) !important;
      font-size: 18px !important;
      transition: var(--transition) !important;
      border-radius: 8px !important;
      margin-bottom: 4px !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--accent-dim) !important;
      border-color: var(--border-glow) !important;
      color: var(--accent) !important;
    }
    .leaflet-attribution-flag { display: none !important; }
    .leaflet-control-attribution {
      background: rgba(8,12,20,0.6) !important;
      color: var(--text-lo) !important;
      font-size: 10px !important;
      border-radius: 6px !important;
      backdrop-filter: blur(8px) !important;
    }

    /* ══════════════════════════════════════════════
       TOOLTIP DEL MAPA
    ══════════════════════════════════════════════ */
    .map-tooltip {
      background: var(--bg-glass) !important;
      backdrop-filter: blur(16px) !important;
      border: 1px solid var(--border-glow) !important;
      border-radius: 10px !important;
      color: var(--text-hi) !important;
      font-family: 'Syne', sans-serif !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      padding: 8px 14px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 12px var(--accent-glow) !important;
      pointer-events: none !important;
      white-space: nowrap !important;
    }
    .map-tooltip::before { display: none !important; }

    .tooltip-badge {
      display: inline-block;
      background: var(--danger-dim);
      border: 1px solid var(--danger);
      border-radius: 4px;
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--danger);
      padding: 1px 6px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ══════════════════════════════════════════════
       BOTONES FLOTANTES
    ══════════════════════════════════════════════ */
    #fab-group {
      position: absolute;
      bottom: 40px;
      right: 20px;
      z-index: 800;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .fab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      color: var(--text-mid);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      user-select: none;
      outline: none;
      white-space: nowrap;
    }
    .fab:hover {
      background: var(--accent-dim);
      border-color: var(--border-glow);
      color: var(--accent);
      transform: translateX(-3px);
      box-shadow: 0 6px 24px rgba(255,160,30,0.2);
    }
    .fab:active {
      transform: translateX(-3px) scale(0.96);
    }
    .fab svg {
      width: 14px; height: 14px;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .fab:hover svg { transform: rotate(15deg); }

    .fab.active {
      background: var(--accent-dim);
      border-color: var(--border-glow);
      color: var(--accent);
    }

    /* ══════════════════════════════════════════════
       BARRA DE BÚSQUEDA
    ══════════════════════════════════════════════ */
    #search-container {
      position: absolute;
      top: 80px;
      left: 20px;
      z-index: 800;
      width: 280px;
    }

    #search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    #search-icon {
      position: absolute;
      left: 12px;
      color: var(--text-lo);
      transition: color var(--transition);
      pointer-events: none;
    }
    #search-wrap:focus-within #search-icon { color: var(--accent); }

    #search-input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      background: var(--bg-glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      color: var(--text-hi);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: var(--transition);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    #search-input::placeholder { color: var(--text-lo); }
    #search-input:focus {
      border-color: var(--border-glow);
      box-shadow: 0 4px 24px rgba(255,160,30,0.2), 0 0 0 3px rgba(255,160,30,0.08);
    }

    #autocomplete-list {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 12px 36px rgba(0,0,0,0.4);
      display: none;
      animation: slide-down 0.2s ease;
    }
    #autocomplete-list.open { display: block; }
    @keyframes slide-down {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auto-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-mid);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      border-bottom: 1px solid var(--border-dim);
    }
    .auto-item:last-child { border-bottom: none; }
    .auto-item:hover, .auto-item.focused {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .auto-item .ai-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--danger); flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════════════ */
    #sidebar {
      position: absolute;
      top: 0; right: 0;
      width: var(--sidebar-w);
      height: 100%;
      z-index: 900;
      background: var(--bg-card);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-left: 1px solid var(--border-dim);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(.4,0,.2,1);
      box-shadow: -8px 0 48px rgba(0,0,0,0.45);
      overflow: hidden;
    }
    #sidebar.open { transform: translateX(0); }

    /* encabezado sidebar */
    .sb-header {
      flex-shrink: 0;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(180deg, rgba(255,160,30,0.06) 0%, transparent 100%);
    }
    .sb-title-wrap { flex: 1; min-width: 0; }
    .sb-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .sb-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text-hi);
      line-height: 1.15;
    }

    #sb-close {
      width: 32px; height: 32px;
      background: var(--border-dim);
      border: 1px solid var(--border-dim);
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-mid);
      transition: var(--transition);
      flex-shrink: 0;
    }
    #sb-close:hover { background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }

    /* métricas rápidas */
    .sb-metrics {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border-dim);
      border-bottom: 1px solid var(--border-dim);
    }
    .sb-metric {
      background: var(--bg-surface);
      padding: 14px 12px;
      text-align: center;
    }
    .sb-metric .m-val {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text-hi);
      line-height: 1;
      margin-bottom: 4px;
      transition: color 0.3s;
    }
    .sb-metric .m-val.danger { color: var(--danger); }
    .sb-metric .m-val.accent { color: var(--accent); }
    .sb-metric .m-lbl {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text-lo);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* contenido scrollable */
    .sb-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scrollbar-width: thin;
      scrollbar-color: var(--border-dim) transparent;
    }
    .sb-body::-webkit-scrollbar { width: 4px; }
    .sb-body::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 4px; }

    /* sección dentro del sidebar */
    .sb-section { animation: fade-in-up 0.35s ease both; }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sb-section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-lo);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sb-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-dim);
    }

    /* tarjeta de incidente */
    .incident-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color var(--transition), background var(--transition);
      position: relative;
      overflow: hidden;
    }
    .incident-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--danger);
      border-radius: 3px 0 0 3px;
    }
    .incident-card.warn::before { background: var(--accent); }
    .incident-card:hover {
      border-color: rgba(255,61,90,0.3);
      background: rgba(255,61,90,0.05);
    }
    .incident-card.warn:hover {
      border-color: var(--border-glow);
      background: var(--accent-dim);
    }

    .ic-type {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--danger);
      font-weight: 600;
    }
    .ic-type.warn { color: var(--accent); }
    .ic-type .ic-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor;
    }

    .ic-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-lo);
    }

    .ic-desc {
      font-size: 12.5px;
      color: var(--text-mid);
      line-height: 1.55;
    }
    .ic-desc strong { color: var(--text-hi); font-weight: 500; }

    .ic-amount {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--danger);
      background: var(--danger-dim);
      border-radius: 6px;
      padding: 3px 8px;
      align-self: flex-start;
      margin-top: 2px;
    }
    .ic-amount.warn { color: var(--accent); background: var(--accent-dim); }

    .ic-source {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--info);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity var(--transition);
    }
    .ic-source:hover { opacity: 1; }

    /* alerta genérica */
    .sb-alert {
      background: var(--danger-dim);
      border: 1px solid rgba(255,61,90,0.3);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.5;
    }
    .sb-alert strong { color: var(--danger); }

    .sb-stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 0;
      border-bottom: 1px solid var(--border-dim);
      font-size: 12.5px;
    }
    .sb-stat-row:last-child { border-bottom: none; }
    .sb-stat-row .sr-label { color: var(--text-mid); }
    .sb-stat-row .sr-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-hi);
      font-weight: 500;
    }
    .sr-val.up { color: var(--danger); }
    .sr-val.mid { color: var(--accent); }

    /* ══════════════════════════════════════════════
       LEYENDA
    ══════════════════════════════════════════════ */
    #legend {
      position: absolute;
      bottom: 40px;
      left: 20px;
      z-index: 800;
      background: var(--bg-glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius);
      padding: 12px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .legend-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text-lo);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-mid);
      margin-bottom: 5px;
      font-family: 'IBM Plex Mono', monospace;

  selectedMun:  null,
  selectedLayer: null,
  bordersVisible: true,
  isDayMode: false,
};

// Capas de tiles (día / noche)
const TILES = {
  dark:  "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",
  light: "https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",
};
const ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>';

// Crear mapa
const map = L.map("map", {
  center: [18.8, -98.1],
  zoom: 8,
  zoomControl: true,
  attributionControl: true,
  fadeAnimation: true,
  zoomAnimation: true,
  wheelPxPerZoomLevel: 80,
});

let tileLayer = L.tileLayer(TILES.dark, { attribution: ATTR, maxZoom: 18 }).addTo(map);

// Capa GeoJSON
let geoLayer;

/* ─── ESTILOS DE POLÍGONO ─── */
function polyStyle(feature) {
  const name = feature.properties.NOM_MUN;
  const data = MUNICIPALITY_DATA[name];
  if (!data) return {
    color: "#aaa", weight: 1,
    fillColor: "#aaa", fillOpacity: 0.05
  };
  return {
    color: data.color,
    weight: 1.5,
    fillColor: data.color,
    fillOpacity: state.bordersVisible ? 0.14 : 0,
    opacity: state.bordersVisible ? 1 : 0,
  };
}

function polyStyleHover(feature) {
  const name = feature.properties.NOM_MUN;
  const data = MUNICIPALITY_DATA[name];
  return {
    color: data ? data.color : "#fff",
    weight: 2.5,
    fillOpacity: 0.30,
    opacity: 1,
  };
}

function polyStyleActive(feature) {
  const name = feature.properties.NOM_MUN;
  const data = MUNICIPALITY_DATA[name];
  return {
    color: data ? data.color : "#ff3d5a",
    weight: 3,
    fillOpacity: 0.42,
    opacity: 1,
  };
}

/* ─── INTERACCIONES CON POLÍGONOS ─── */
function onEachFeature(feature, layer) {
  const name = feature.properties.NOM_MUN;
  const data = MUNICIPALITY_DATA[name];
  if (!data) return;

  // Tooltip
  layer.bindTooltip(
    `<span>${data.name}</span><span class="tooltip-badge">${data.risk}</span>`,
    { permanent: false, className: "map-tooltip", direction: "top", offset: [0, -6] }
  );

  layer.on({
    mouseover(e) {
      if (state.selectedLayer !== layer) {
        layer.setStyle(polyStyleHover(feature));
      }
      layer.openTooltip();
    },
    mouseout(e) {
      if (state.selectedLayer !== layer) {
        geoLayer.resetStyle(layer);
        if (!state.bordersVisible) layer.setStyle({ fillOpacity: 0, opacity: 0 });
      }
      layer.closeTooltip();
    },
    click(e) {
      selectMunicipality(name, layer, feature);
    },
  });
}

/* ─── SELECCIONAR MUNICIPIO ─── */
function selectMunicipality(name, layer, feature) {
  // Deseleccionar anterior
  if (state.selectedLayer) {
    geoLayer.resetStyle(state.selectedLayer);
    if (!state.bordersVisible) {
      state.selectedLayer.setStyle({ fillOpacity: 0, opacity: 0 });
    }
    const prevEl = state.selectedLayer.getElement();
    if (prevEl) prevEl.classList.remove("pulsing");
  }

  const data = MUNICIPALITY_DATA[name];
  if (!data) return;

  state.selectedMun   = name;
  state.selectedLayer = layer;

  // Estilo activo + pulso
  layer.setStyle(polyStyleActive(feature));
  const el = layer.getElement();
  if (el) {
    el.classList.remove("pulsing");
    void el.offsetWidth; // reflow
    el.classList.add("pulsing");
  }

  // Zoom suave
  const bounds = layer.getBounds();
  map.flyToBounds(bounds, { padding: [80, 80], maxZoom: 13, duration: 0.9 });

  // Actualizar HUD
  updateHUD(data);

  // Abrir sidebar
  openSidebar(data);
}

/* ─── HUD ─── */
function updateHUD(data) {
  document.getElementById("hud-selected-label").textContent = data.name;
  animateCount("hud-inc",   parseFloat(data.incidents),     0, 800);
  animateCount("hud-fraud", data.fraud_amount,              null, 600, true);
  animateText ("hud-risk",  data.risk);
}

function animateCount(id, target, start = 0, duration = 800, isStr = false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove("flash");
  void el.offsetWidth;
  if (isStr) {
    el.textContent = target;
    el.classList.add("flash");
    return;
  }
  const startTime = performance.now();
  function step(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(start + (target - start) * eased);
    if (progress < 1) requestAnimationFrame(step);
    else { el.textContent = target; el.classList.add("flash"); }
  }
  requestAnimationFrame(step);
}

function animateText(id, text) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add("flash");
  el.textContent = text;
}

/* ─── SIDEBAR ─── */
const sidebar  = document.getElementById("sidebar");
const sbClose  = document.getElementById("sb-close");
const sbTitle  = document.getElementById("sb-title");
const sbBody   = document.getElementById("sb-body");
const sbM1     = document.getElementById("sb-m1");
const sbM2     = document.getElementById("sb-m2");
const sbM3     = document.getElementById("sb-m3");

function openSidebar(data) {
  sbTitle.textContent = data.name;
  sidebar.classList.add("open");

  // Fade out → actualizar → fade in
  sbBody.style.opacity = "0";
  sbBody.style.transform = "translateY(8px)";

  setTimeout(() => {
    renderSidebarContent(data);
    sbBody.style.transition = "opacity 0.22s ease, transform 0.22s ease";
    sbBody.style.opacity    = "1";
    sbBody.style.transform  = "translateY(0)";
  }, 160);

  // Métricas con count-up
  animateSbMetric("sb-m1", data.incidents, 0, 900);
  sbM2.textContent = data.fraud_amount;
  sbM3.textContent = data.risk;
}

function closeSidebar() {
  sidebar.classList.remove("open");
  // Deseleccionar polígono
  if (state.selectedLayer) {
    geoLayer.resetStyle(state.selectedLayer);
    if (!state.bordersVisible) state.selectedLayer.setStyle({ fillOpacity: 0, opacity: 0 });
    const el = state.selectedLayer.getElement();
    if (el) el.classList.remove("pulsing");
  }
  state.selectedLayer = null;
  state.selectedMun   = null;
  document.getElementById("hud-selected-label").textContent = "— Selecciona un municipio —";
  ["hud-inc","hud-risk","hud-fraud"].forEach(id => document.getElementById(id).textContent = "—");
}

sbClose.addEventListener("click", closeSidebar);
sbClose.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") closeSidebar(); });

function animateSbMetric(id, target, start = 0, duration = 900) {
  const el = document.getElementById(id);
  if (!el || typeof target !== "number") return;
  const startTime = performance.now();
  function step(now) {
    const p = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(start + (target - start) * eased);
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = target;
  }
  requestAnimationFrame(step);
}

function renderSidebarContent(data) {
  let html = "";

  // Estadísticas rápidas
  if (data.stats && data.stats.length) {
    html += `<div class="sb-section">
      <div class="sb-section-title">Estadísticas</div>`;
    data.stats.forEach((s, i) => {
      html += `<div class="sb-stat-row" style="animation-delay:${i * 0.04}s">
        <span class="sr-label">${s.label}</span>
        <span class="sr-val ${s.cls || ''}">${s.val}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // Secciones de incidentes
  data.sections.forEach((sec, si) => {
    html += `<div class="sb-section" style="animation-delay:${(si + 1) * 0.07}s">
      <div class="sb-section-title">${sec.title}</div>`;

    if (sec.extra) {
      html += sec.extra;
    }

    if (sec.incidents) {
      sec.incidents.forEach((inc, ii) => {
        const tc   = inc.typeClass || "";
        const anim = `animation-delay:${ii * 0.06}s`;
        html += `<div class="incident-card ${tc}" style="${anim}">
          <div class="ic-type ${tc}">
            <div class="ic-dot"></div>${inc.type}
          </div>
          <div class="ic-date">${inc.date}</div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--text-hi);margin:2px 0">${inc.title}</div>
          <div class="ic-desc">${inc.desc}</div>`;
        if (inc.amount) {
          html += `<div class="ic-amount ${inc.amountClass || ''}">${inc.amount}</div>`;
        }
        if (inc.source) {
          html += `<a href="${inc.source}" target="_blank" rel="noopener" class="ic-source">${inc.sourceLabel}</a>`;
        }
        html += `</div>`;
      });
    }

    html += `</div>`;
  });

  sbBody.innerHTML = html;
}

/* ─── INICIALIZAR GEOJSON ─── */
geoLayer = L.geoJSON(GEOJSON_DATA, {
  style: polyStyle,
  onEachFeature,
}).addTo(map);

/* ═══════════════════════════════════════════════════════════════
   BÚSQUEDA CON AUTOCOMPLETADO
═══════════════════════════════════════════════════════════════ */
const searchInput = document.getElementById("search-input");
const autoList    = document.getElementById("autocomplete-list");
const munNames    = Object.keys(MUNICIPALITY_DATA);
let focusedIdx    = -1;

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  focusedIdx = -1;
  if (!q) { autoList.classList.remove("open"); autoList.innerHTML = ""; return; }

  const matches = munNames.filter(n =>
    n.toLowerCase().includes(q) ||
    MUNICIPALITY_DATA[n].name.toLowerCase().includes(q)
  );

  if (!matches.length) { autoList.classList.remove("open"); autoList.innerHTML = ""; return; }

  autoList.innerHTML = matches.map((m, i) =>
    `<div class="auto-item" data-name="${m}" tabindex="0" role="option" aria-selected="false">
      <div class="ai-dot"></div>
      <span>${MUNICIPALITY_DATA[m].name}</span>
    </div>`
  ).join("");

  autoList.querySelectorAll(".auto-item").forEach(item => {
    item.addEventListener("click", () => {
      pickAutocomplete(item.dataset.name);
    });
    item.addEventListener("keydown", e => {
      if (e.key === "Enter") pickAutocomplete(item.dataset.name);
    });
  });

  autoList.classList.add("open");
});

searchInput.addEventListener("keydown", e => {
  const items = autoList.querySelectorAll(".auto-item");
  if (!items.length) return;
  if (e.key === "ArrowDown") {
    e.preventDefault();
    focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
    updateAutoFocus(items);
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    focusedIdx = Math.max(focusedIdx - 1, 0);
    updateAutoFocus(items);
  } else if (e.key === "Enter" && focusedIdx >= 0) {
    e.preventDefault();
    pickAutocomplete(items[focusedIdx].dataset.name);
  } else if (e.key === "Escape") {
    autoList.classList.remove("open");
  }
});

document.addEventListener("click", e => {
  if (!e.target.closest("#search-container")) {
    autoList.classList.remove("open");
  }
});

function updateAutoFocus(items) {
  items.forEach((item, i) => item.classList.toggle("focused", i === focusedIdx));
}

function pickAutocomplete(name) {
  const data = MUNICIPALITY_DATA[name];
  if (!data) return;
  searchInput.value = data.name;
  autoList.classList.remove("open");
  autoList.innerHTML = "";

  // Encontrar capa y seleccionar
  geoLayer.eachLayer(layer => {
    if (layer.feature && layer.feature.properties.NOM_MUN === name) {
      selectMunicipality(name, layer, layer.feature);
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   BOTONES FAB
═══════════════════════════════════════════════════════════════ */
// Reset vista
document.getElementById("btn-reset").addEventListener("click", () => {
  map.flyTo([18.8, -98.1], 8, { duration: 0.9 });
  closeSidebar();
  searchInput.value = "";
});

// Mostrar/Ocultar límites
document.getElementById("btn-borders").addEventListener("click", function () {
  state.bordersVisible = !state.bordersVisible;
  this.classList.toggle("active", state.bordersVisible);
  this.setAttribute("aria-pressed", state.bordersVisible);
  this.querySelector("span").textContent = state.bordersVisible ? "Límites" : "Ver límites";

  geoLayer.eachLayer(layer => {
    if (state.selectedLayer === layer) return; // no ocultar activo
    if (state.bordersVisible) {
      geoLayer.resetStyle(layer);
    } else {
      layer.setStyle({ fillOpacity: 0, opacity: 0 });
    }
  });
});

// Modo día/noche
const btnTheme  = document.getElementById("btn-theme");
const themeIcon = document.getElementById("theme-icon");
const SUN_SVG = `<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/>`;
const MOON_SVG = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

btnTheme.addEventListener("click", () => {
  state.isDayMode = !state.isDayMode;
  document.body.classList.toggle("day-mode", state.isDayMode);
  btnTheme.querySelector("span").textContent = state.isDayMode ? "Modo noche" : "Modo día";
  themeIcon.innerHTML = state.isDayMode ? SUN_SVG : MOON_SVG;

  if (tileLayer) map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(state.isDayMode ? TILES.light : TILES.dark, {
    attribution: ATTR, maxZoom: 18
  }).addTo(map);
});

/* ═══════════════════════════════════════════════════════════════
   LOADING OVERLAY – QUITAR TRAS CARGA
═══════════════════════════════════════════════════════════════ */
window.addEventListener("load", () => {
  setTimeout(() => {
    const overlay = document.getElementById("loading-overlay");
    overlay.classList.add("hidden");
    // Foco en mapa tras ocultar overlay
    setTimeout(() => overlay.style.display = "none", 700);
  }, 1400);
});

// Fallback por si "load" ya disparó
if (document.readyState === "complete") {
  setTimeout(() => {
    const overlay = document.getElementById("loading-overlay");
    if (overlay) { overlay.classList.add("hidden"); setTimeout(() => overlay.style.display = "none", 700); }
  }, 1400);
}
</script>

</html>
